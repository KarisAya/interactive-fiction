<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IF 互动小说</title>
  </head>
  <body>
    <div class="app-container">
      <div class="sidebar-header" id="sidebarHeader">
        <div class="logo-area">
          <i class="fa-solid fa-book"></i>
          IF 互动小说
        </div>
        <div class="header-actions">
          <button class="sidebar-button" id="sidebarSearchBtn" title="search">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          <button class="sidebar-button" id="sidebarHiddenBtn" title="hidden">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </div>
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header-empty"></div>
        <button class="new-fiction-btn" id="newFictionBtn"><i class="fa-solid fa-plus"></i>开启新剧本</button>
        <div class="history-container" id="historyContainer"></div>
        <div class="others" id="others">
          <div class="others-info">
            <a href="https://qm.qq.com/q/AnTDkyTrii" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-at"></i> KarisAya </a>
            <a href="https://github.com/KarisAya/interactive-fiction" target="_blank" rel="noopener noreferrer">
              <i class="fa-brands fa-github"></i> GitHub Source
            </a>
            <span id="about"><i class="fa-solid fa-copyright"></i> 2026 IF 互动小说</span>
          </div>
          <button class="sidebar-button" id="configBtn" title="config">
            <i class="fa-solid fa-gear"></i>
          </button>
        </div>
      </div>
      <div class="sidebar-empty" id="sidebarEmpty"></div>
      <main class="main-container" id="mainContainer">
        <div class="content-area" id="contentArea"></div>
        <div class="select-area" id="selectArea"></div>
        <div class="input-area" id="inputArea">
          <textarea id="messageInput" placeholder="..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" title="send"><i class="fa-solid fa-arrow-up"></i></button>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
